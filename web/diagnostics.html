<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Droid Status — AMIDALA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/common.css">
<style>
.pin-led{font-size:1.1rem;flex-shrink:0;transition:color .15s}
.pin-led.high{color:#2a8a2a}
.pin-led.low{color:var(--border)}
.pin-state{font:500 12px/1 ui-monospace,'SF Mono',Menlo,monospace;letter-spacing:.08em;flex-shrink:0;min-width:2.5rem}
.pin-state.high{color:#2a8a2a}
.pin-state.low{color:var(--muted)}
.ain-val{font:500 14px/1 ui-monospace,'SF Mono',Menlo,monospace;color:var(--accent);flex-shrink:0}
.row-note{font-size:.65rem;color:var(--muted);margin-left:.35rem}
.gpio{font:500 10px/1 ui-monospace,'SF Mono',Menlo,monospace;letter-spacing:.12em;color:var(--muted);flex-shrink:0}
#ts{text-align:center;padding:.6rem 0;color:var(--muted);font:500 10px/1 ui-monospace,'SF Mono',Menlo,monospace;letter-spacing:.1em;border-top:1px solid var(--border);margin-top:.5rem}
</style>
<script>!function(){var t=localStorage.getItem("amidala-theme")||(matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");document.documentElement.dataset.theme=t}()</script>
</head>
<body>
<div class="page-header">
  <a class="back" href="/">&#9664; BACK</a>
  <div class="page-title"><span class="dot"></span><span class="label">Droid Status</span><span class="dot"></span></div>
</div>
<main id="main">
  <div id="ts">LOADING&#8230;</div>
</main>
<script src="/assets/edit.js"></script>
<script>
var DOUT = [
  {id:'dout0', label:'Digital 1', gpio:'GPIO39'},
  {id:'dout1', label:'Digital 2', gpio:'GPIO40', note:'dome hall sensor'},
  {id:'dout2', label:'Digital 3', gpio:'GPIO41'},
  {id:'dout3', label:'Digital 4', gpio:'GPIO42'}
];
var AIN = [
  {id:'ain0', label:'Analog 1', gpio:'GPIO1'},
  {id:'ain1', label:'Analog 2', gpio:'GPIO2'}
];

function buildUI() {
  var html = '<div class="section-label">Digital Outputs</div>';
  DOUT.forEach(function(d) {
    var note = d.note ? '<span class="row-note">(' + d.note + ')</span>' : '';
    html += '<div class="row">'
      + '<div class="row-label">' + d.label + note + '</div>'
      + '<span class="gpio">' + d.gpio + '</span>'
      + '<div class="pin-led low" id="' + d.id + '_led">&#9679;</div>'
      + '<div class="pin-state low" id="' + d.id + '_st">LOW</div>'
      + '</div>';
  });
  html += '<div class="section-label">Analog Inputs</div>';
  AIN.forEach(function(a) {
    html += '<div class="row">'
      + '<div class="row-label">' + a.label + '</div>'
      + '<span class="gpio">' + a.gpio + '</span>'
      + '<div class="ain-val" id="' + a.id + '">&#8212;</div>'
      + '</div>';
  });
  html += '<div id="ts">&#8212;</div>';
  document.getElementById('main').innerHTML = html;
}

function refresh() {
  fetch('/api/pins')
    .then(function(r){return r.json();})
    .then(function(d){
      d.dout.forEach(function(v,i){
        var led = document.getElementById(DOUT[i].id+'_led');
        var st  = document.getElementById(DOUT[i].id+'_st');
        if(!led||!st) return;
        var cls = v ? 'high' : 'low';
        led.className = 'pin-led '+cls;
        st.className  = 'pin-state '+cls;
        st.textContent = v ? 'HIGH' : 'LOW';
      });
      d.ain.forEach(function(v,i){
        var el = document.getElementById(AIN[i].id);
        if(el) el.textContent = v;
      });
      var ts = document.getElementById('ts');
      if(ts) ts.textContent = 'Updated '+new Date().toLocaleTimeString();
    })
    .catch(function(){
      var ts = document.getElementById('ts');
      if(ts) ts.textContent = 'Connection error';
    });
}

buildUI();
refresh();
setInterval(refresh, 2000);
</script>
</body>
</html>
