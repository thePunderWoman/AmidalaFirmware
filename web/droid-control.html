<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Droid Control — AMIDALA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/common.css">
<style>
.ctrl-section{padding:.75rem 0 1.2rem;max-width:820px;margin:0 auto}
.dome-stop{width:100%;padding:1.1rem;background:var(--danger-soft);border:1px solid var(--danger);color:var(--danger);font-size:1.1rem;font-weight:bold;border-radius:6px;cursor:pointer;letter-spacing:.1em;margin-bottom:.9rem;-webkit-tap-highlight-color:transparent;transition:background .15s,color .15s}
.dome-stop:hover,.dome-stop:active{background:var(--danger);color:#fff}
.btn-group{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.4rem}
.angle-btn{padding:.8rem .2rem}
.custom-row{display:flex;gap:.5rem;align-items:center;margin-top:.6rem}
.custom-row span{font-size:.78rem;color:var(--muted);white-space:nowrap}
.custom-row input[type=number]{flex:1;max-width:6rem;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.7rem .6rem;border-radius:4px;font-size:.9rem}
.custom-row input[type=number]:focus{outline:none;border-color:var(--accent)}
.cmd-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
.empty-note{padding:.75rem 0;color:var(--muted);font-size:.82rem}
.empty-note a{color:var(--text)}
.coming-soon{text-align:center;padding:3.5rem 1rem;color:var(--muted)}
.cs-icon{font-size:2.5rem;margin-bottom:.8rem;opacity:.35}
.cs-title{font-size:.85rem;letter-spacing:.2em;text-transform:uppercase;margin-bottom:.8rem}
.cs-text{font-size:.8rem;line-height:1.65;max-width:380px;margin:0 auto}
.cs-text a{color:var(--text)}
/* ---- volume bar ---- */
#vol-bar{max-width:820px;margin:.9rem auto 0;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:.55rem .8rem}
.vol-bar-inner{display:flex;align-items:center;gap:.7rem}
.vol-bar-inner label{font:500 11px/1 ui-monospace,'SF Mono',Menlo,monospace;letter-spacing:.18em;color:var(--muted);white-space:nowrap}
#vol-ch{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.28rem .45rem;border-radius:4px;font-family:inherit;font-size:.78rem;flex-shrink:0}
#vol-slider{flex:1;accent-color:var(--accent);min-width:0}
#vol-val{font:500 13px/1 ui-monospace,'SF Mono',Menlo,monospace;color:var(--accent);min-width:2.4rem;text-align:right;flex-shrink:0}
/* ---- dome compass ---- */
.dome-pos-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;align-items:center;margin-bottom:.6rem;padding-top:.5rem}
.dome-pos-left{display:flex;flex-direction:column;gap:.5rem}
.dome-pos-right{display:flex;flex-direction:column;align-items:center;gap:.35rem}
.dome-deg-display{font:500 13px/1 ui-monospace,'SF Mono',Menlo,monospace;color:var(--accent);letter-spacing:.08em}
/* ---- category groups ---- */
.cat-hdr{font:600 .7rem/1 ui-monospace,'SF Mono',Menlo,monospace;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);padding:.8rem 0 .35rem;border-top:1px solid var(--border);margin-top:.4rem}
.cat-hdr:first-child{border-top:none;margin-top:0;padding-top:.2rem}
</style>
<script>!function(){var t=localStorage.getItem("amidala-theme")||(matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");document.documentElement.dataset.theme=t}()</script>
</head>
<body>
<div class="page-header">
  <a class="back" href="/">&#9664; BACK</a>
  <div class="page-title"><span class="dot"></span><span class="label">Droid Control</span><span class="dot"></span></div>
</div>
<div id="vol-bar" hidden>
  <div class="vol-bar-inner">
    <label>VOLUME</label>
    <select id="vol-ch" onchange="onVolChChange()">
      <option value="0">Global</option>
      <option value="1">Voice</option>
      <option value="2">Ch A</option>
      <option value="3">Ch B</option>
    </select>
    <input type="range" id="vol-slider" min="0" max="100" value="50" oninput="onVolSlide(this.value)">
    <span id="vol-val">50</span>
  </div>
</div>
<div class="tabs">
  <button class="tab" data-tab="favorites"  onclick="showHashTab('favorites')">Favorites</button>
  <button class="tab" data-tab="dome"       onclick="showHashTab('dome')">Dome</button>
  <button class="tab" data-tab="sequences"  onclick="showHashTab('sequences')">Sequences</button>
  <button class="tab" data-tab="gadgets"    onclick="showHashTab('gadgets')">Gadgets</button>
  <button class="tab" data-tab="hcr"        onclick="showHashTab('hcr')" id="hcr-tab" hidden>HCR</button>
</div>
<div id="main"><div id="status">LOADING&#8230;</div></div>
<script src="/assets/edit.js"></script>
<script>
var _cfg = null;
var _tab = 'favorites';

var ANGLES    = [0,45,90,135,180,225,270,315];
var GADGET_NAMES = ['Periscope','Lifeform Scanner','Lightsaber Launcher','Bubble Gun','Zapper Arm','Gripper','Data Probe'];
var HCR_EMOS  = ['Happy','Sad','Mad','Scared'];

function isGadgetSstr(oneBasedIdx) {
  return (_cfg.gadgets_cfg || []).some(function(g) {
    return g && g.type > 0 && (g.sstr || []).indexOf(oneBasedIdx) >= 0;
  });
}

function sstrCatFor(oneIdx) {
  var cats = _cfg.sstr_cats || [];
  for (var i = 0; i < cats.length; i++) {
    if ((cats[i].idx || []).indexOf(oneIdx) >= 0) return cats[i].name;
  }
  return '';
}

function sstrIsHidden(oneIdx) {
  return (_cfg.sstr_hidden || []).indexOf(oneIdx) >= 0;
}

// True when catName exactly matches an enabled gadget name (used to route commands to Gadgets tab)
function isGadgetCat(catName) {
  if (!catName) return false;
  var gCfg = _cfg.gadgets_cfg || [];
  for (var i = 0; i < GADGET_NAMES.length; i++) {
    if (GADGET_NAMES[i] === catName && gCfg[i] && gCfg[i].type > 0) return true;
  }
  return false;
}

function load() {
  fetch('/api/config')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      _cfg = d;
      initVolBar(d);
      var hcrTab = document.getElementById('hcr-tab');
      if (hcrTab) hcrTab.hidden = (d.audiohw !== 'hcr');
      initHashTabs('favorites', function(t) { _tab = t; render(); });
    })
    .catch(function() { document.getElementById('status').textContent = 'Failed to load.'; });
}

function render() {
  if (_tab !== 'dome') stopDomePoll();
  if      (_tab === 'dome')      renderDome();
  else if (_tab === 'favorites') renderFavorites();
  else if (_tab === 'sequences') renderSequences();
  else if (_tab === 'gadgets')   renderGadgets();
  else if (_tab === 'hcr')       renderHCR();
}

function domePost(cmd) {
  fetch('/api/dome', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: 'cmd=' + encodeURIComponent(cmd)
  }).then(function(r) { showToast(r.ok ? 'Sent' : 'Failed', !r.ok); })
    .catch(function() { showToast('Network error', true); });
}

function serialPost(idx) {
  fetch('/api/serial', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: 'idx=' + idx
  }).then(function(r) { showToast(r.ok ? 'Sent' : 'Failed', !r.ok); })
    .catch(function() { showToast('Network error', true); });
}

function hcrPost(cmd, emotion, level) {
  var body = 'cmd=' + encodeURIComponent(cmd);
  if (cmd === 'emote') body += '&emotion=' + emotion + '&level=' + level;
  fetch('/api/hcr', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: body
  }).then(function(r) { showToast(r.ok ? 'Sent' : 'Failed', !r.ok); })
    .catch(function() { showToast('Network error', true); });
}

function domeMoveTo() {
  var v = document.getElementById('dome-angle').value;
  var n = parseInt(v, 10);
  if (isNaN(n) || n < 0 || n > 359) { showToast('Enter 0–359', true); return; }
  domePost(String(n));
}

var _domePoller = null;
function startDomePoll() {
  if (_domePoller) return;
  updateDomePos();
  _domePoller = setInterval(updateDomePos, 500);
}
function stopDomePoll() {
  if (_domePoller) { clearInterval(_domePoller); _domePoller = null; }
}
function updateDomePos() {
  fetch('/api/info')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var needle = document.getElementById('dome-needle');
      var degEl  = document.getElementById('dome-deg');
      if (!needle || !degEl) { stopDomePoll(); return; }
      var deg = d.dome_degrees || 0;
      needle.setAttribute('transform', 'rotate(' + deg + ')');
      degEl.textContent = d.dome_homed ? (deg + '°') : '—';
    })
    .catch(function() { stopDomePoll(); });
}

var _volCh = 0;
var _volDebounce = null;
var _volByChannel = [50, 50, 50, 50];
function initVolBar(cfg) {
  var isHCR = (cfg.audiohw === 'hcr');
  var bar = document.getElementById('vol-bar');
  if (!bar) return;
  bar.hidden = false;
  var chSel = document.getElementById('vol-ch');
  if (chSel) chSel.hidden = !isHCR;
  var v = cfg.volume !== undefined ? cfg.volume : 50;
  _volByChannel = [v, v,
    cfg.volumeChA !== undefined ? cfg.volumeChA : v,
    cfg.volumeChB !== undefined ? cfg.volumeChB : v,
    v];
  setVolSlider(0);
}
function setVolSlider(ch) {
  _volCh = ch;
  var vol = _volByChannel[ch] !== undefined ? _volByChannel[ch] : 50;
  var sl = document.getElementById('vol-slider');
  var vd = document.getElementById('vol-val');
  if (sl) sl.value = vol;
  if (vd) vd.textContent = vol;
}
function onVolChChange() {
  var sel = document.getElementById('vol-ch');
  if (sel) setVolSlider(parseInt(sel.value, 10));
}
function onVolSlide(val) {
  var v = parseInt(val, 10);
  if (isNaN(v)) return;
  _volByChannel[_volCh] = v;
  var vd = document.getElementById('vol-val');
  if (vd) vd.textContent = v;
  clearTimeout(_volDebounce);
  _volDebounce = setTimeout(function() {
    fetch('/api/volume', {
      method: 'POST',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: 'ch=' + _volCh + '&vol=' + v
    });
  }, 60);
}

function renderFavorites() {
  var sstr = _cfg.sstr || [];
  var favs = [];
  (_cfg.sstr_favs || []).forEach(function(oneIdx) {
    if (oneIdx >= 1 && oneIdx <= sstr.length) favs.push({s: sstr[oneIdx - 1], idx: oneIdx});
  });

  var h = '<div class="ctrl-section">';
  if (favs.length === 0) {
    h += '<div class="empty-note">No favorites yet. Star commands in <a href="/config/serial-strings">Serial Commands</a>.</div>';
  } else {
    h += '<div class="cmd-grid">';
    favs.forEach(function(item) {
      h += '<button class="grid-btn" onclick="serialPost(' + item.idx + ')">' + esc(item.s.n) + '</button>';
    });
    h += '</div>';
  }
  h += '</div>';
  document.getElementById('main').innerHTML = h;
}

function renderDome() {
  var h = '<div class="ctrl-section">';
  h += '<button class="dome-stop" onclick="domePost(\'stop\')">&#9632;&nbsp; STOP</button>';

  h += '<div class="sec-hdr" style="margin-top:.2rem">Position</div>';
  h += '<div class="dome-pos-grid">';
  h += '<div class="dome-pos-left">';
  h += '<button class="dc-btn" onclick="domePost(\'front\')">Face Front</button>';
  h += '<div class="custom-row" style="margin-top:.6rem;justify-content:center">';
  h += '<span>Custom:</span>';
  h += '<input id="dome-angle" name="dome-angle" type="number" min="0" max="359" placeholder="0–359">';
  h += '<button class="dc-btn" onclick="domeMoveTo()">Go</button>';
  h += '</div>';
  h += '</div>';
  h += '<div class="dome-pos-right">';
  h += '<svg id="dome-svg" viewBox="-60 -60 120 120" width="140" height="140" style="display:block">';
  h += '<circle r="55" fill="none" stroke="var(--border)" stroke-width="1.5"/>';
  var ticks = [0,45,90,135,180,225,270,315];
  for (var ti = 0; ti < ticks.length; ti++) {
    var major = (ticks[ti] % 90 === 0);
    h += '<line y1="' + (major ? -52 : -50) + '" y2="-55" stroke="var(--' + (major ? 'text' : 'border') + ')" stroke-width="' + (major ? 1.5 : 1) + '" transform="rotate(' + ticks[ti] + ')"/>';
  }
  h += '<text y="-38" text-anchor="middle" font-size="7" fill="var(--muted)" font-family="ui-monospace,Menlo,monospace">0</text>';
  h += '<text x="38" y="3" text-anchor="middle" font-size="7" fill="var(--muted)" font-family="ui-monospace,Menlo,monospace">90</text>';
  h += '<text y="44" text-anchor="middle" font-size="7" fill="var(--muted)" font-family="ui-monospace,Menlo,monospace">180</text>';
  h += '<text x="-38" y="3" text-anchor="middle" font-size="7" fill="var(--muted)" font-family="ui-monospace,Menlo,monospace">270</text>';
  h += '<line id="dome-needle" x1="0" y1="6" x2="0" y2="-44" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round"/>';
  h += '<circle r="4" fill="var(--accent)"/>';
  h += '</svg>';
  h += '<div class="dome-deg-display" id="dome-deg">&#8212;</div>';
  h += '</div>';
  h += '</div>';

  h += '<div class="sec-hdr">Go to Angle</div>';
  h += '<div class="angle-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem">';
  ANGLES.forEach(function(a) {
    h += '<button class="angle-btn" onclick="domePost(\'' + a + '\')">' + a + '&#176;</button>';
  });
  h += '</div>';

  h += '<div class="sec-hdr">Relative Move</div>';
  h += '<div class="angle-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem">';
  h += '<button class="angle-btn" onclick="domePost(\'-90\')">&#9664;&#9664; 90&#176;</button>';
  h += '<button class="angle-btn" onclick="domePost(\'-45\')">&#9664; 45&#176;</button>';
  h += '<button class="angle-btn" onclick="domePost(\'+45\')">45&#176; &#9654;</button>';
  h += '<button class="angle-btn" onclick="domePost(\'+90\')">90&#176; &#9654;&#9654;</button>';
  h += '</div>';

  h += '<div class="sec-hdr">Modes</div>';
  h += '<div class="btn-group">';
  h += '<button class="dc-btn" onclick="domePost(\'rand\')">Toggle Random</button>';
  h += '<button class="dc-btn" onclick="domePost(\'abstick\')">Toggle Abs-Stick</button>';
  h += '</div>';

  h += '</div>';
  document.getElementById('main').innerHTML = h;
  startDomePoll();
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderSequences() {
  var sstr = _cfg.sstr || [];
  var h = '<div class="ctrl-section">';

  // Filter: not hidden, not assigned to a gadget via legacy sstr[] assignment,
  // and not categorized as an enabled gadget name
  var visItems = [];
  sstr.forEach(function(s, i) {
    var oneIdx = i + 1;
    if (sstrIsHidden(oneIdx)) return;    // hidden from Sequences tab
    if (isGadgetSstr(oneIdx)) return;    // legacy gadget assignment
    var cat = sstrCatFor(oneIdx);
    if (isGadgetCat(cat)) return;        // categorized as enabled gadget
    visItems.push({s: s, idx: oneIdx, cat: cat});
  });

  if (visItems.length === 0 && sstr.length === 0) {
    h += '<div class="empty-note">No serial commands configured. <a href="/config/serial-strings">Add some in Serial Commands.</a></div>';
  } else if (visItems.length === 0) {
    h += '<div class="empty-note">All commands are hidden or assigned to gadgets.</div>';
  } else {
    // Group by category, sort categories alphabetically (empty = "Uncategorized" last)
    var catMap = {};
    visItems.forEach(function(item) {
      var cat = item.cat || '';
      if (!catMap[cat]) catMap[cat] = [];
      catMap[cat].push(item);
    });
    var cats = Object.keys(catMap).sort(function(a, b) {
      if (!a && b) return 1;
      if (a && !b) return -1;
      return a.toLowerCase() < b.toLowerCase() ? -1 : 1;
    });
    cats.forEach(function(cat) {
      if (cat) {
        h += '<div class="cat-hdr">' + esc(cat) + '</div>';
      } else if (cats.length > 1) {
        h += '<div class="cat-hdr">Uncategorized</div>';
      }
      var items = catMap[cat].slice().sort(function(a, b) {
        return a.s.n.toLowerCase() < b.s.n.toLowerCase() ? -1 : 1;
      });
      h += '<div class="cmd-grid">';
      items.forEach(function(item) {
        h += '<button class="grid-btn" onclick="serialPost(' + item.idx + ')">' + esc(item.s.n) + '</button>';
      });
      h += '</div>';
    });
  }

  h += '</div>';
  document.getElementById('main').innerHTML = h;
}

function renderHCR() {
  var h = '<div class="ctrl-section">';
  h += '<div class="cmd-grid">';
  h += '<button class="grid-btn full" onclick="hcrPost(\'muse\')">Toggle Musing</button>';
  HCR_EMOS.forEach(function(emo, ei) {
    h += '<button class="grid-btn" onclick="hcrPost(\'emote\',' + ei + ',0)">' + emo + '<br><span style="font-size:.72rem;opacity:.7">Moderate</span></button>';
    h += '<button class="grid-btn" onclick="hcrPost(\'emote\',' + ei + ',1)">' + emo + '<br><span style="font-size:.72rem;opacity:.7">Strong</span></button>';
  });
  h += '</div>';
  h += '</div>';
  document.getElementById('main').innerHTML = h;
}

function renderGadgets() {
  var gCfg = _cfg.gadgets_cfg || [];
  var sstr = _cfg.sstr || [];
  var hasEnabled = gCfg.some(function(g) { return g && g.type > 0; });

  if (!hasEnabled) {
    document.getElementById('main').innerHTML =
      '<div class="coming-soon">' +
      '<div class="cs-icon">&#9881;</div>' +
      '<div class="cs-title">No Gadgets Configured</div>' +
      '<div class="cs-text">Configure which accessories are installed in your build on the ' +
      '<a href="/config/gadgets">Gadgets config page</a>.</div>' +
      '</div>';
    return;
  }

  var h = '<div class="ctrl-section">';
  gCfg.forEach(function(g, i) {
    if (!g || g.type === 0) return;
    var gadgetName = GADGET_NAMES[i];
    h += '<div class="sec-hdr">' + gadgetName + '</div>';

    // Commands from legacy explicit sstr[] assignment
    var slots = (g.sstr || []).filter(function(idx) { return idx > 0 && idx <= sstr.length; });
    // Commands from category matching this gadget name
    var catItems = [];
    var cats = _cfg.sstr_cats || [];
    cats.forEach(function(c) {
      if (c.name !== gadgetName) return;
      (c.idx || []).forEach(function(oneIdx) {
        if (oneIdx >= 1 && oneIdx <= sstr.length && slots.indexOf(oneIdx) < 0) {
          catItems.push({s: sstr[oneIdx - 1], idx: oneIdx});
        }
      });
    });

    if (slots.length === 0 && catItems.length === 0) {
      h += '<div style="padding:.3rem 0 .6rem;color:var(--muted);font-size:.78rem">No commands assigned. <a href="/config/gadgets">Configure</a> or set category in <a href="/config/serial-strings">Serial Commands</a>.</div>';
    } else {
      h += '<div class="cmd-grid">';
      slots.forEach(function(idx) {
        var s = sstr[idx - 1];
        if (s) h += '<button class="grid-btn" onclick="serialPost(' + idx + ')">' + esc(s.n) + '</button>';
      });
      catItems.sort(function(a, b) { return a.s.n.toLowerCase() < b.s.n.toLowerCase() ? -1 : 1; });
      catItems.forEach(function(item) {
        h += '<button class="grid-btn" onclick="serialPost(' + item.idx + ')">' + esc(item.s.n) + '</button>';
      });
      h += '</div>';
    }
  });
  h += '</div>';
  document.getElementById('main').innerHTML = h;
}

load();
</script>
</body>
</html>
