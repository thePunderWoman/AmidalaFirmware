<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Droid Control — AMIDALA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/common.css">
<style>
.ctrl-section{padding:.75rem 0 1.2rem;max-width:820px;margin:0 auto}
.dome-stop{width:100%;padding:1.1rem;background:var(--danger-soft);border:1px solid var(--danger);color:var(--danger);font-size:1.1rem;font-weight:bold;border-radius:6px;cursor:pointer;letter-spacing:.1em;margin-bottom:.9rem;-webkit-tap-highlight-color:transparent;transition:background .15s,color .15s}
.dome-stop:hover,.dome-stop:active{background:var(--danger);color:#fff}
.btn-group{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.4rem}
.angle-btn{padding:.8rem .2rem}
.custom-row{display:flex;gap:.5rem;align-items:center;margin-top:.6rem}
.custom-row span{font-size:.78rem;color:var(--muted);white-space:nowrap}
.custom-row input[type=number]{flex:1;max-width:6rem;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.7rem .6rem;border-radius:4px;font-size:.9rem}
.custom-row input[type=number]:focus{outline:none;border-color:var(--accent)}
.cmd-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
.empty-note{padding:.75rem 0;color:var(--muted);font-size:.82rem}
.empty-note a{color:var(--text)}
.coming-soon{text-align:center;padding:3.5rem 1rem;color:var(--muted)}
.cs-icon{font-size:2.5rem;margin-bottom:.8rem;opacity:.35}
.cs-title{font-size:.85rem;letter-spacing:.2em;text-transform:uppercase;margin-bottom:.8rem}
.cs-text{font-size:.8rem;line-height:1.65;max-width:380px;margin:0 auto}
.cs-text a{color:var(--text)}
</style>
<script>!function(){var t=localStorage.getItem("amidala-theme")||(matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");document.documentElement.dataset.theme=t}()</script>
</head>
<body>
<div class="page-header">
  <a class="back" href="/">&#9664; BACK</a>
  <div class="page-title"><span class="dot"></span><span class="label">Droid Control</span><span class="dot"></span></div>
</div>
<div class="tabs">
  <button class="tab" data-tab="dome"      onclick="showHashTab('dome')">Dome</button>
  <button class="tab" data-tab="sequences" onclick="showHashTab('sequences')">Sequences</button>
  <button class="tab" data-tab="gadgets"   onclick="showHashTab('gadgets')">Gadgets</button>
</div>
<div id="main"><div id="status">LOADING&#8230;</div></div>
<script src="/assets/edit.js"></script>
<script>
var _cfg = null;
var _tab = 'dome';

var ANGLES    = [0,45,90,135,180,225,270,315];
var HCR_EMOS  = ['Happy','Sad','Mad','Scared'];
var GADGET_NAMES = ['Periscope','Lifeform Scanner','Lightsaber Launcher','Bubble Gun','Zapper Arm','Gripper','Data Probe'];

function isGadgetSstr(oneBasedIdx) {
  return (_cfg.gadgets_cfg || []).some(function(g) {
    return g && g.type > 0 && (g.sstr || []).indexOf(oneBasedIdx) >= 0;
  });
}

function load() {
  fetch('/api/config')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      _cfg = d;
      initHashTabs('dome', function(t) { _tab = t; render(); });
    })
    .catch(function() { document.getElementById('status').textContent = 'Failed to load.'; });
}

function render() {
  if (_tab === 'dome')           renderDome();
  else if (_tab === 'sequences') renderSequences();
  else                           renderGadgets();
}

function domePost(cmd) {
  fetch('/api/dome', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: 'cmd=' + encodeURIComponent(cmd)
  }).then(function(r) { showToast(r.ok ? 'Sent' : 'Failed', !r.ok); })
    .catch(function() { showToast('Network error', true); });
}

function serialPost(idx) {
  fetch('/api/serial', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: 'idx=' + idx
  }).then(function(r) { showToast(r.ok ? 'Sent' : 'Failed', !r.ok); })
    .catch(function() { showToast('Network error', true); });
}

function hcrPost(cmd, emotion, level) {
  var body = 'cmd=' + encodeURIComponent(cmd);
  if (cmd === 'emote') body += '&emotion=' + emotion + '&level=' + level;
  fetch('/api/hcr', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: body
  }).then(function(r) { showToast(r.ok ? 'Sent' : 'Failed', !r.ok); })
    .catch(function() { showToast('Network error', true); });
}

function domeMoveTo() {
  var v = document.getElementById('dome-angle').value;
  var n = parseInt(v, 10);
  if (isNaN(n) || n < 0 || n > 359) { showToast('Enter 0–359', true); return; }
  domePost(String(n));
}

function renderDome() {
  var h = '<div class="ctrl-section">';
  h += '<button class="dome-stop" onclick="domePost(\'stop\')">&#9632;&nbsp; STOP</button>';

  h += '<div class="sec-hdr" style="margin-top:.2rem">Position</div>';
  h += '<div class="btn-group" style="grid-template-columns:1fr">';
  h += '<button class="dc-btn" onclick="domePost(\'home\')">Go Home</button>';
  h += '</div>';

  h += '<div class="sec-hdr">Go to Angle</div>';
  h += '<div class="angle-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem">';
  ANGLES.forEach(function(a) {
    h += '<button class="angle-btn" onclick="domePost(\'' + a + '\')">' + a + '&#176;</button>';
  });
  h += '</div>';
  h += '<div class="custom-row">';
  h += '<span>Custom:</span>';
  h += '<input id="dome-angle" name="dome-angle" type="number" min="0" max="359" placeholder="0–359">';
  h += '<button class="dc-btn" onclick="domeMoveTo()">Go</button>';
  h += '</div>';

  h += '<div class="sec-hdr">Relative Move</div>';
  h += '<div class="angle-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem">';
  h += '<button class="angle-btn" onclick="domePost(\'-90\')">&#9664;&#9664; 90&#176;</button>';
  h += '<button class="angle-btn" onclick="domePost(\'-45\')">&#9664; 45&#176;</button>';
  h += '<button class="angle-btn" onclick="domePost(\'+45\')">45&#176; &#9654;</button>';
  h += '<button class="angle-btn" onclick="domePost(\'+90\')">90&#176; &#9654;&#9654;</button>';
  h += '</div>';

  h += '<div class="sec-hdr">Modes</div>';
  h += '<div class="btn-group">';
  h += '<button class="dc-btn" onclick="domePost(\'rand\')">Toggle Random</button>';
  h += '<button class="dc-btn" onclick="domePost(\'abstick\')">Toggle Abs-Stick</button>';
  h += '</div>';

  h += '</div>';
  document.getElementById('main').innerHTML = h;
}

function renderSequences() {
  var sstr = _cfg.sstr || [];
  var h = '<div class="ctrl-section">';

  h += '<div class="sec-hdr" style="margin-top:0">Serial Commands</div>';
  var unassigned = sstr.filter(function(_, i) { return !isGadgetSstr(i + 1); });
  if (unassigned.length === 0 && sstr.length === 0) {
    h += '<div class="empty-note">No serial commands configured. <a href="/config/serial-strings">Add some in Serial Commands.</a></div>';
  } else if (unassigned.length === 0) {
    h += '<div class="empty-note">All serial commands are assigned to gadgets. See <a href="/droid-control#gadgets">Gadgets</a>.</div>';
  } else {
    h += '<div class="cmd-grid">';
    sstr.forEach(function(s, i) {
      if (isGadgetSstr(i + 1)) return;
      h += '<button class="grid-btn" onclick="serialPost(' + (i + 1) + ')">' + s.n + '</button>';
    });
    h += '</div>';
  }

  if (_cfg.audiohw === 'hcr') {
    h += '<div class="sec-hdr">HCR Audio</div>';
    h += '<div class="cmd-grid">';
    h += '<button class="grid-btn full" onclick="hcrPost(\'muse\')">Toggle Musing</button>';
    HCR_EMOS.forEach(function(emo, ei) {
      h += '<button class="grid-btn" onclick="hcrPost(\'emote\',' + ei + ',0)">' + emo + '<br><span style="font-size:.72rem;opacity:.7">Moderate</span></button>';
      h += '<button class="grid-btn" onclick="hcrPost(\'emote\',' + ei + ',1)">' + emo + '<br><span style="font-size:.72rem;opacity:.7">Strong</span></button>';
    });
    h += '</div>';
  }

  h += '</div>';
  document.getElementById('main').innerHTML = h;
}

function renderGadgets() {
  var gCfg = _cfg.gadgets_cfg || [];
  var sstr = _cfg.sstr || [];
  var hasEnabled = gCfg.some(function(g) { return g && g.type > 0; });

  if (!hasEnabled) {
    document.getElementById('main').innerHTML =
      '<div class="coming-soon">' +
      '<div class="cs-icon">&#9881;</div>' +
      '<div class="cs-title">No Gadgets Configured</div>' +
      '<div class="cs-text">Configure which accessories are installed in your build on the ' +
      '<a href="/config/gadgets">Gadgets config page</a>.</div>' +
      '</div>';
    return;
  }

  var h = '<div class="ctrl-section">';
  gCfg.forEach(function(g, i) {
    if (!g || g.type === 0) return;
    h += '<div class="sec-hdr">' + GADGET_NAMES[i] + '</div>';
    var slots = (g.sstr || []).filter(function(idx) { return idx > 0 && idx <= sstr.length; });
    if (slots.length === 0) {
      h += '<div style="padding:.3rem 0 .6rem;color:var(--muted);font-size:.78rem">No commands assigned. <a href="/config/gadgets">Configure</a></div>';
    } else {
      h += '<div class="cmd-grid">';
      slots.forEach(function(idx) {
        var s = sstr[idx - 1];
        if (s) h += '<button class="grid-btn" onclick="serialPost(' + idx + ')">' + s.n + '</button>';
      });
      h += '</div>';
    }
  });
  h += '</div>';
  document.getElementById('main').innerHTML = h;
}

load();
</script>
</body>
</html>
