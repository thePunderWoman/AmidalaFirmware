<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RC Radio — AMIDALA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/common.css">
<script>!function(){var t=localStorage.getItem("amidala-theme")||(matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");document.documentElement.dataset.theme=t}()</script>
</head>
<body>
<div class="page-header">
  <a class="back" href="/">&#9664; BACK</a>
  <div class="page-title"><span class="dot"></span><span class="label">RC Radio</span><span class="dot"></span></div>
</div>
<main>
  <div id="status">LOADING&#8230;</div>
</main>
<script src="/assets/edit.js"></script>
<script>
var SCHEMA = [
  {section:'Radio'},
  {key:'rcchn', label:'Channel Count',       type:'number', min:6,   max:8},
  {key:'rcd',   label:'Deadzone',            type:'number', min:1,   max:50},
  {key:'rcj',   label:'Jitter Filter',       type:'number', min:1,   max:40},
  {key:'fst',   label:'Failsafe Timeout',    type:'number', min:1000,max:3000, note:'ms'},
  {section:'Right Joystick Calibration'},
  {key:'rvrmin',label:'Min Reference',       type:'number', min:0,   max:100},
  {key:'rvrmax',label:'Max Reference',       type:'number', min:900, max:1023},
  {section:'Left Joystick Calibration'},
  {key:'rvlmin',label:'Min Reference',       type:'number', min:0,   max:100},
  {key:'rvlmax',label:'Max Reference',       type:'number', min:900, max:1023},
  {section:'Joystick Adjustment'},
  {key:'j1adjv',label:'Vertical Adjust',     type:'number', min:0,   max:80},
  {key:'j1adjh',label:'Horizontal Adjust',   type:'number', min:0,   max:80}
];
buildPage(SCHEMA, '/api/config', function(d) {
  if (d.rcchn == 0) {
    var banner = '<div class="info-banner">RC Radio is not configured (channel count = 0). '
      + 'These settings have no effect until an RC receiver is connected and rcchn is set to 6 or more.</div>';
    document.querySelector('main').insertAdjacentHTML('afterbegin', banner);
  } else {
    document.querySelector('main').insertAdjacentHTML('afterbegin',
      '<div class="info-banner">These settings apply only when using an RC radio receiver (PPM/PWM input). '
      + 'If your build uses XBee or a wired pocket remote, this page has no effect.</div>');
  }
});
</script>
</body>
</html>
