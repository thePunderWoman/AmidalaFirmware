<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Servos — AMIDALA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/common.css">
<style>
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);padding:.5rem;text-align:center;border-bottom:1px solid var(--border);white-space:nowrap}
th:first-child{text-align:right;width:2rem}
td{padding:.45rem .5rem;text-align:center;border-bottom:1px solid var(--border);color:var(--text)}
td:first-child{color:var(--muted);font-size:.7rem;text-align:right}
td input[type=number]{width:4.2rem;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.25rem .3rem;text-align:center;font-family:inherit;font-size:.8rem;box-sizing:border-box;border-radius:3px}
td input[type=number]:focus{outline:none;border-color:var(--accent)}
td input[type=checkbox]{accent-color:var(--accent);width:1rem;height:1rem;cursor:pointer;vertical-align:middle}
.act{white-space:nowrap}
.be,.bs,.bc{background:none;border:none;color:var(--muted);font-size:1rem;padding:.2rem .4rem;opacity:.7;cursor:pointer}
.be:hover,.bs:hover,.bc:hover{opacity:1;color:var(--accent)}
.rev-yes{color:var(--accent)}
.rev-no{color:var(--muted)}
</style>
<script>!function(){var t=localStorage.getItem("amidala-theme")||(matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");document.documentElement.dataset.theme=t}()</script>
</head>
<body>
<div class="page-header">
  <a class="back" href="/">&#9664; BACK</a>
  <div class="page-title"><span class="dot"></span><span class="label">Servos</span><span class="dot"></span></div>
</div>
<main>
  <div id="tbl-area"><div id="status">LOADING&#8230;</div></div>
  <div id="pulse-area"></div>
</main>
<script src="/assets/edit.js"></script>
<script>
var _d = [];
var _ed = -1;

function load() {
  fetch('/api/config').then(function(r){return r.json();}).then(function(d){
    _d = d.servos || [];
    render();
    var pa = document.getElementById('pulse-area');
    var minpulse = d.minpulse !== undefined ? String(d.minpulse) : '1000';
    var maxpulse = d.maxpulse !== undefined ? String(d.maxpulse) : '2000';
    pa.innerHTML =
      '<div class="section-label" style="margin-top:.8rem">Global Pulse Limits</div>' +
      buildRow({key:'minpulse', label:'Min Pulse Width', type:'number', min:500, max:1500, note:'µs'}, minpulse) +
      buildRow({key:'maxpulse', label:'Max Pulse Width', type:'number', min:1500, max:2500, note:'µs'}, maxpulse);
  }).catch(function(){
    document.getElementById('tbl-area').innerHTML='<div id="status">Failed to load</div>';
  });
}

function render() {
  var h = '<div class="section-label">Servo Channels</div><div class="tbl-wrap"><table><thead><tr>' +
    '<th>#</th><th>Min</th><th>Max</th><th>Neutral</th><th>Deadzone</th><th>Trim</th><th>Speed</th><th>Reversed</th><th></th>' +
    '</tr></thead><tbody>';
  for (var i = 0; i < _d.length; i++) {
    var s = _d[i];
    if (i === _ed) {
      h += '<tr>' +
        '<td>'+(i+1)+'</td>' +
        '<td><input type="number" id="emin" value="'+s.min+'" min="0" max="180"></td>' +
        '<td><input type="number" id="emax" value="'+s.max+'" min="0" max="180"></td>' +
        '<td><input type="number" id="en"   value="'+s.n+'"   min="0" max="180"></td>' +
        '<td><input type="number" id="ed"   value="'+s.d+'"   min="0" max="180"></td>' +
        '<td><input type="number" id="et"   value="'+s.t+'"   min="-180" max="180"></td>' +
        '<td><input type="number" id="esp"  value="'+s.sp+'"  min="1"  max="100"></td>' +
        '<td><input type="checkbox" id="er"'+(s.r?' checked':'')+'></td>' +
        '<td class="act">' +
          '<button class="bs" onclick="saveRow('+i+')" title="Save">&#10003;</button>' +
          '<button class="bc" onclick="cancelEdit()" title="Cancel">&#10005;</button>' +
        '</td></tr>';
    } else {
      h += '<tr>' +
        '<td>'+(i+1)+'</td>' +
        '<td>'+s.min+'</td><td>'+s.max+'</td><td>'+s.n+'</td>' +
        '<td>'+s.d+'</td><td>'+s.t+'</td><td>'+s.sp+'</td>' +
        '<td class="'+(s.r?'rev-yes':'rev-no')+'">'+(s.r?'Yes':'No')+'</td>' +
        '<td class="act"><button class="be" onclick="editRow('+i+')" title="Edit">&#9998;</button></td>' +
        '</tr>';
    }
  }
  h += '</tbody></table></div>';
  document.getElementById('tbl-area').innerHTML = h;
  if (_ed >= 0) {
    var el = document.getElementById('emin');
    if (el) el.focus();
  }
}

function editRow(i)  { _ed = i; render(); }
function cancelEdit(){ _ed = -1; render(); }

function saveRow(i) {
  var min = parseInt(document.getElementById('emin').value,10);
  var max = parseInt(document.getElementById('emax').value,10);
  var n   = parseInt(document.getElementById('en').value,10);
  var d   = parseInt(document.getElementById('ed').value,10);
  var t   = parseInt(document.getElementById('et').value,10);
  var sp  = parseInt(document.getElementById('esp').value,10);
  var r   = document.getElementById('er').checked ? 1 : 0;
  if (isNaN(min)||isNaN(max)||isNaN(n)||isNaN(d)||isNaN(t)||isNaN(sp)) {
    showToast('All fields must be numbers', true); return;
  }
  fetch('/api/config', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: 'key=s&value='+(i+1)+','+min+','+max+','+n+','+d+','+t+','+sp+','+r
  }).then(function(resp){
    if (!resp.ok) throw new Error(resp.status);
    _d[i] = {min:min, max:max, n:n, d:d, t:t, sp:sp, r:r};
    _ed = -1;
    render();
    showToast('Saved');
  }).catch(function(){ showToast('Save failed', true); });
}

load();
</script>
</body>
</html>
