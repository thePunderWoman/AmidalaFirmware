; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; `pio run` only builds the firmware.  Use `pio test -e native` for unit tests.
[platformio]
default_envs = megaatmega2560

[env:megaatmega2560]
platform = atmelavr
board = megaatmega2560
framework = arduino
lib_deps =
	https://github.com/reeltwo/Reeltwo#23.5.3
	https://github.com/reeltwo/ReeltwoAudio
	https://github.com/roy86/HumanCyborgRelationsAPI
	arduino-libraries/SD@^1.3.0
	andrewrapp/XBee@0.0.0-alpha+sha.39f236ea18
	adafruit/Adafruit NeoPixel@^1.15.4
	adafruit/Adafruit PWM Servo Driver Library@^3.0.3
	adafruit/Adafruit BusIO@^1.16.3
	fastled/FastLED@^3.10.3
	wayoda/LedControl@^1.0.6
	; RoboClaw motor controller library — only needed for DOME_DRIVE_ROBOCLAW builds.
	; The native test environment intentionally omits this (hardware-only dependency).
	https://github.com/basicmicro/roboclaw_arduino_library
lib_ignore = EspSoftwareSerial
monitor_speed = 115200
monitor_port = /dev/cu.usb*

[env:native]
platform = native
; This env is only used via `pio test -e native`.  It is excluded from the
; default_envs above so `pio run` never tries to build it.
; scripts/native_lib_includes.py adds Reeltwo headers to the include path.
; Reeltwo is an Arduino library so PlatformIO's LDF marks it framework-
; incompatible for native and won't add it automatically; the script picks
; up either the local lib/ copy (dev) or the downloaded libdeps copy (CI).
extra_scripts = pre:scripts/native_lib_includes.py
build_flags = -std=c++14 -DUNIT_TEST -Itest -isysroot /Library/Developer/CommandLineTools/SDKs/MacOSX.sdk
test_build_src = no
lib_deps = 
    https://github.com/reeltwo/Reeltwo#23.5.3
    https://github.com/reeltwo/ReeltwoAudio
	https://github.com/roy86/HumanCyborgRelationsAPI
	andrewrapp/XBee@0.0.0-alpha+sha.39f236ea18
	adafruit/Adafruit NeoPixel@^1.15.4
	adafruit/Adafruit PWM Servo Driver Library@^3.0.3
	fastled/FastLED@^3.10.3
	wayoda/LedControl@^1.0.6
