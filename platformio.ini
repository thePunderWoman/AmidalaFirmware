; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; `pio run` only builds the firmware.  Use `pio test -e native` for unit tests.
[platformio]
default_envs = esp32s3

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
; Enable USB-CDC as Serial so UART0 (GPIO43/44) is free for the WCB serial out.
; N16R8: 16 MB QIO flash + 8 MB OPI PSRAM.
build_flags =
	-DARDUINO_USB_CDC_ON_BOOT=1
	; Force-include compatibility shim so third-party libs (HCR) compile on ESP32-S3
	; without source modifications (setWireTimeout → setTimeout mapping).
	-include include/esp32_compat.h
	; Allow non-conforming switch-case variable jumps in HCR library source.
	-fpermissive
; N8R2: 8 MB QIO flash + 2 MB QSPI PSRAM.
; QSPI PSRAM uses only DQ0-DQ3 (internal to module), leaving GPIO35-37 free
; for the external SPI bus (SD card, XBee).  This avoids the GPIO35-37
; conflict that the N16R8's OPI PSRAM caused.
board_build.flash_size = 8MB
board_build.arduino.memory_type = qio_qspi
; Factory partition (not OTA) so the bootloader always boots unconditionally.
board_build.partitions = partitions/factory_8MB.csv
lib_deps =
	https://github.com/reeltwo/Reeltwo#23.5.3
	https://github.com/reeltwo/ReeltwoAudio#v23.5.6
	; HumanCyborgRelationsAPI is in lib/ — local copy used, no remote entry needed.
	; EspSoftwareSerial provides SoftwareSerial.h so the unmodified HCR library compiles.
	plerup/EspSoftwareSerial
	; The ESP32 Arduino framework bundles its own SD library — do NOT add
	; arduino-libraries/SD here; that package is AVR-only (Sd2PinMap.h fails).
	adafruit/Adafruit NeoPixel@^1.15.4
	fastled/FastLED@^3.10.3
	https://github.com/basicmicro/roboclaw_arduino_library
	; andrewrapp/XBee omitted — XBee 3 SPI transport is implemented in-tree (PR esp32-2).
monitor_speed = 115200
monitor_port = /dev/cu.usb*

[env:native]
platform = native
; This env is only used via `pio test -e native`.  It is excluded from the
; default_envs above so `pio run` never tries to build it.
; scripts/native_lib_includes.py adds Reeltwo headers to the include path.
; Reeltwo is an Arduino library so PlatformIO's LDF marks it framework-
; incompatible for native and won't add it automatically; the script picks
; up either the local lib/ copy (dev) or the downloaded libdeps copy (CI).
extra_scripts = pre:scripts/native_lib_includes.py
build_flags = -std=c++14 -DUNIT_TEST -Itest -isysroot /Library/Developer/CommandLineTools/SDKs/MacOSX.sdk
test_build_src = no
lib_deps =
	https://github.com/reeltwo/Reeltwo#23.5.3
	https://github.com/roy86/HumanCyborgRelationsAPI
	adafruit/Adafruit NeoPixel@^1.15.4
	fastled/FastLED@^3.10.3
