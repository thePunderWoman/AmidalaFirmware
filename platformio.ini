; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; `pio run` only builds the firmware.  Use `pio test -e native` for unit tests.
[platformio]
default_envs = megaatmega2560

[env:megaatmega2560]
platform = atmelavr
board = megaatmega2560
framework = arduino
lib_extra_dirs = ~/Documents/Arduino/libraries
lib_deps =
	arduino-libraries/SD@^1.3.0
	andrewrapp/XBee@0.0.0-alpha+sha.39f236ea18
	adafruit/Adafruit NeoPixel@^1.15.4
	adafruit/Adafruit PWM Servo Driver Library@^3.0.3
	adafruit/Adafruit BusIO@^1.16.3
	fastled/FastLED@^3.10.3
	wayoda/LedControl@^1.0.6
lib_ignore = EspSoftwareSerial
monitor_speed = 115200
monitor_port = /dev/cu.usb*

[env:native]
platform = native
; This env is only used via `pio test -e native`.  It is excluded from the
; default_envs above so `pio run` never tries to build it.
build_flags = -std=c++14 -DUNIT_TEST -Itest -Ilib/Reeltwo/src -isysroot /Library/Developer/CommandLineTools/SDKs/MacOSX.sdk
test_build_src = no
lib_deps = 
    https://github.com/reeltwo/Reeltwo#23.5.3
    https://github.com/reeltwo/ReeltwoAudio
	https://github.com/roy86/HumanCyborgRelationsAPI
	andrewrapp/XBee@0.0.0-alpha+sha.39f236ea18
	adafruit/Adafruit NeoPixel@^1.15.4
	adafruit/Adafruit PWM Servo Driver Library@^3.0.3
	fastled/FastLED@^3.10.3
	wayoda/LedControl@^1.0.6
